<!DOCTYPE html>
<html>
<head>
    <title>Student Records</title>
    <style>
        body {
            margin:0;
            font-family: Arial, sans-serif;
            height:100vh;
            overflow:hidden;
            background:#000;
        }

        #bg {
            position:fixed;
            width:100%;
            height:100%;
            top:0;
            left:0;
            z-index:0;
        }

        .container {
            position:relative;
            z-index:1;
            width: 90%;
            max-width:1000px;
            margin:50px auto;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            padding:20px;
            border-radius:15px;
            color:white;
            text-align:center;
        }

        h2 { margin-bottom:20px; }
        input { width:200px; padding:5px; margin-bottom:15px; }
        table { width:100%; border-collapse:collapse; color:white; }
        th, td { padding:10px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.3); }
        th { background: rgba(0,0,0,0.5); }
        tr:nth-child(even) { background: rgba(255,255,255,0.1); }
        tr:hover { background: rgba(255,255,255,0.2); }
        img { width:40px; height:40px; border-radius:50%; }
        button { padding:5px 10px; margin:2px; border:none; border-radius:5px; cursor:pointer; }
        .delete-btn { background:red; color:white; }
        .clear-btn { background:#ff9800; color:white; margin-top:10px; }
        #gameBtn { background:#00c6ff; color:white; margin:10px 0; }
        #enrollBtn { background:#4CAF50; color:white; margin-top:10px; }
        #loginBtn { position:absolute; top:20px; right:20px; padding:8px 12px; }

        #editModal {
            display:none;
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            background:rgba(0,0,0,0.95);
            padding:20px;
            border-radius:10px;
            z-index:9999;
            color:white;
        }

        #snakeModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 15px;
            z-index: 9999;
            transition: transform 0.3s ease;
        }

        #snakeModal.active { transform: translate(-50%, -50%) scale(1); }

        #snakeCanvas { background:#000; display:block; margin:auto; border-radius:10px; }
    </style>
</head>

<body>
<canvas id="bg"></canvas>

<div class="container">
    <h2>📋 Student Records</h2>
    <input type="text" id="search" placeholder="Search..." />
    <table>
        <thead>
            <tr>
                <th>#</th><th>Pic</th><th>Name</th><th>Age</th><th>Sex</th><th>Grade</th><th>Section</th><th>Action</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <button class="clear-btn" onclick="clearStudents()">Clear All</button>
    <button id="enrollBtn">➕ Enroll New Student</button>
    <button id="gameBtn">🎮 Play Snake</button>
</div>

<button id="loginBtn"></button>

<!-- Edit Modal -->
<div id="editModal">
    <h3>Edit Student</h3>
    <input type="text" id="editName"><br>
    <input type="number" id="editAge"><br>
    <input type="text" id="editSex"><br>
    <input type="text" id="editGrade"><br>
    <input type="text" id="editSection"><br><br>
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeEdit()">Cancel</button>
</div>

<!-- Snake Game Modal -->
<div id="snakeModal">
    <h3>Snake Game</h3>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    <div id="scoreDisplay" style="color:white;">Score: 0</div>
    <button id="closeGame">Close</button>
</div>

<script>
/* ------------------ Background Galaxy ------------------ */
const bg = document.getElementById("bg");
const ctx = bg.getContext("2d");
function resize(){ bg.width = window.innerWidth; bg.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);

let stars = [];
for(let i=0;i<250;i++){ stars.push({x:Math.random()*bg.width, y:Math.random()*bg.height, z:Math.random()*bg.width, size:Math.random()*1.5+0.2, speed:Math.random()*0.3+0.05, color:`hsl(${Math.random()*360},100%,70%)`}); }
let shootingStars = [];
function spawnShootingStar(){ shootingStars.push({x:Math.random()*bg.width, y:0, dx:Math.random()*6+4, dy:Math.random()*3+2, life:100}); }
setInterval(spawnShootingStar,2000);

function drawGalaxy(){
    let gradient = ctx.createRadialGradient(bg.width/2,bg.height/2,0,bg.width/2,bg.height/2,bg.width);
    gradient.addColorStop(0,"#120024"); gradient.addColorStop(0.5,"#020214"); gradient.addColorStop(1,"#000000");
    ctx.fillStyle=gradient; ctx.fillRect(0,0,bg.width,bg.height);

    stars.forEach(s=>{
        s.z -= s.speed*5;
        if(s.z <=0) s.z = bg.width;
        let scale = bg.width/s.z;
        let x = (s.x-bg.width/2)*scale+bg.width/2;
        let y = (s.y-bg.height/2)*scale+bg.height/2;
        let size = s.size*scale;
        ctx.beginPath(); ctx.fillStyle=s.color; ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
    });

    shootingStars.forEach((s,i)=>{
        s.x += s.dx; s.y += s.dy; s.life--;
        ctx.beginPath(); ctx.strokeStyle="white"; ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-10,s.y-10); ctx.stroke();
        if(s.life<=0) shootingStars.splice(i,1);
    });

    requestAnimationFrame(drawGalaxy);
}
drawGalaxy();

/* ------------------ Student Management ------------------ */
const user = JSON.parse(localStorage.getItem("currentUser"));
if(!user){ alert("Please login first!"); window.location.href="login.html"; }

const loginBtn = document.getElementById("loginBtn");
loginBtn.textContent="Logout";
loginBtn.onclick=()=>{ localStorage.removeItem("currentUser"); location.reload(); };

document.getElementById("enrollBtn").onclick = ()=>{ window.location.href="enrollment.html"; }

function getStudents(){ return JSON.parse(localStorage.getItem("students") || "[]"); }

let editIndex = null;

function displayStudents(){
    const tbody = document.getElementById("tbody");
    const search = document.getElementById("search").value.toLowerCase();
    const students = getStudents();
    tbody.innerHTML = "";
    students.forEach((s,i)=>{
        if(!s.name.toLowerCase().includes(search)) return;
        tbody.innerHTML+=`
        <tr>
            <td>${i+1}</td>
            <td><img src="${s.img}"></td>
            <td>${s.name}</td>
            <td>${s.age}</td>
            <td>${s.sex}</td>
            <td>${s.grade}</td>
            <td>${s.section}</td>
            <td>
                <button onclick="editStudent(${i})">Edit</button>
                <button class="delete-btn" onclick="deleteStudent(${i})">Delete</button>
            </td>
        </tr>`;
    });
}

function deleteStudent(i){
    let students = getStudents();
    students.splice(i,1);
    localStorage.setItem("students",JSON.stringify(students));
    displayStudents();
}

function clearStudents(){ localStorage.removeItem("students"); displayStudents(); }

function editStudent(i){
    let s = getStudents()[i];
    editIndex = i;
    document.getElementById("editName").value = s.name;
    document.getElementById("editAge").value = s.age;
    document.getElementById("editSex").value = s.sex;
    document.getElementById("editGrade").value = s.grade;
    document.getElementById("editSection").value = s.section;
    document.getElementById("editModal").style.display="block";
}

function saveEdit(){
    let students = getStudents();
    students[editIndex] = {
        ...students[editIndex],
        name:document.getElementById("editName").value,
        age:document.getElementById("editAge").value,
        sex:document.getElementById("editSex").value,
        grade:document.getElementById("editGrade").value,
        section:document.getElementById("editSection").value
    };
    localStorage.setItem("students",JSON.stringify(students));
    closeEdit(); displayStudents();
}

function closeEdit(){ document.getElementById("editModal").style.display="none"; }

document.getElementById("search").addEventListener("input", displayStudents);
displayStudents();

/* ------------------ Snake Game ------------------ */
const snakeBtn = document.getElementById("gameBtn");
const snakeModal = document.getElementById("snakeModal");
const closeGame = document.getElementById("closeGame");
const snakeCanvas = document.getElementById("snakeCanvas");
const sctx = snakeCanvas.getContext("2d");
const scoreDisplay = document.getElementById("scoreDisplay");

let snake = [{x:10,y:10}];
let direction = {x:1,y:0}; // start moving right
let food = {x:15,y:15};
let grid = 20;
let speed = 120;
let score = 0;
let gameInterval;

snakeBtn.onclick = ()=>{
    snakeModal.classList.add("active");
    resetGame();
    startGame();
};

closeGame.onclick = ()=>{
    snakeModal.classList.remove("active");
    clearInterval(gameInterval);
};

function resetGame(){
    snake = [{x:10,y:10}];
    direction = {x:1,y:0};
    food = {
        x: Math.floor(Math.random()*(snakeCanvas.width/grid)),
        y: Math.floor(Math.random()*(snakeCanvas.height/grid))
    };
    score = 0;
    scoreDisplay.textContent = `Score: ${score}`;
    sctx.clearRect(0,0,snakeCanvas.width,snakeCanvas.height);
}

function startGame(){
    clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop,speed);
}

function gameLoop(){
    let head={x:snake[0].x+direction.x, y:snake[0].y+direction.y};
    head.x=(head.x + snakeCanvas.width/grid) % (snakeCanvas.width/grid);
    head.y=(head.y + snakeCanvas.height/grid) % (snakeCanvas.height/grid);

    if(snake.length>1 && snake.some(seg=>seg.x===head.x && seg.y===head.y)){
        alert("Game Over! Your score: "+score);
        resetGame(); 
        return;
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++; scoreDisplay.textContent=`Score: ${score}`;
        food={x:Math.floor(Math.random()*(snakeCanvas.width/grid)), y:Math.floor(Math.random()*(snakeCanvas.height/grid))};
    } else { snake.pop(); }

    drawSnake();
}

function drawSnake(){
    sctx.fillStyle="rgba(0,0,0,0.2)";
    sctx.fillRect(0,0,snakeCanvas.width,snakeCanvas.height);

    sctx.fillStyle="rgba(255,50,150,1)";
    sctx.fillRect(food.x*grid,food.y*grid,grid,grid);

    snake.forEach((seg,i)=>{
        const alpha=0.3+0.7*(i/snake.length);
        sctx.fillStyle=`rgba(0,255,200,${alpha})`;
        sctx.fillRect(seg.x*grid,seg.y*grid,grid,grid);
        sctx.shadowColor=`rgba(0,255,200,${alpha})`; sctx.shadowBlur=8;
    });
    sctx.shadowBlur=0;
}

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp" && direction.y===0) direction={x:0,y:-1};
    if(e.key==="ArrowDown" && direction.y===0) direction={x:0,y:1};
    if(e.key==="ArrowLeft" && direction.x===0) direction={x:-1,y:0};
    if(e.key==="ArrowRight" && direction.x===0) direction={x:1,y:0};
});
</script>
</body>
</html>
